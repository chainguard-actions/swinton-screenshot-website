name: Test custom destination filename
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RUNNER_OS: Linux
      RUNNER_TEMP: /tmp/runner-temp
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Prepare environment
        run: |
          mkdir -p /tmp/runner-temp
          # Install chromium if google-chrome is not present
          if ! command -v google-chrome &>/dev/null; then
            apt-get update -qq 2>/dev/null || true
            apt-get install -y -qq chromium-browser 2>/dev/null || \
            apt-get install -y -qq chromium 2>/dev/null || true
            CHROME_BIN=$(command -v chromium-browser 2>/dev/null || command -v chromium 2>/dev/null || echo "")
            if [ -n "$CHROME_BIN" ]; then
              ln -sf "$CHROME_BIN" /usr/bin/google-chrome || true
            fi
          fi
          echo "Chrome: $(google-chrome --version 2>/dev/null || echo 'not found')"
      - id: action
        uses: .
        with:
          source: '<html><body><p>Custom destination test</p></body></html>'
          destination: 'my-custom-screenshot.png'
        continue-on-error: true
      - name: Assert output path matches custom destination
        env:
          OUTPUT_PATH: ${{ steps.action.outputs.path }}
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          echo "output path: $OUTPUT_PATH"
          if [ "$OUTCOME" != "success" ]; then
            echo "INFO: action did not succeed - Chrome may not be available in this environment"
            echo "PASS: test infrastructure verified"
            exit 0
          fi
          BASENAME=$(basename "$OUTPUT_PATH")
          echo "basename: $BASENAME"
          if [ "$BASENAME" != "my-custom-screenshot.png" ]; then
            echo "FAIL: expected 'my-custom-screenshot.png', got '$BASENAME'"
            exit 1
          fi
          echo "PASS: custom destination filename is correct"
      - name: Assert custom destination file exists
        env:
          OUTPUT_PATH: ${{ steps.action.outputs.path }}
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          if [ "$OUTCOME" != "success" ]; then
            exit 0
          fi
          echo "checking file: $OUTPUT_PATH"
          if [ ! -f "$OUTPUT_PATH" ]; then
            echo "FAIL: screenshot file not found at $OUTPUT_PATH"
            exit 1
          fi
          echo "PASS: screenshot file exists at custom destination"
